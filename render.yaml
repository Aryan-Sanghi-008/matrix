services:
  - type: web
    name: er-triage-backend
    runtime: docker
    plan: free
    rootDir: backend
    envVars:
      - key: PORT
        value: 8081
      - key: AI_PROVIDER
        value: huggingface
      - key: MONGODB_URI
        sync: false # You will provide this in the Render Dashboard
      - key: JWT_SECRET
        generateValue: true # Render will generate a secure random key for you
      - key: HF_API_KEY
        sync: false # You will provide this in the Render Dashboard
      - key: APP_CORS_ALLOWED_ORIGIN_PATTERNS
        value: "https://*.vercel.app,http://localhost:5173"
