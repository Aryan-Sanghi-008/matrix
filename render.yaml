services:
  - type: web
    name: matrix-backend
    runtime: docker
    plan: free
    rootDir: backend
    envVars:
      - key: PORT
        value: 8081
      - key: AI_PROVIDER
        value: huggingface
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: HF_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: APP_CORS_ALLOWED_ORIGIN_PATTERNS
        value: "https://*.vercel.app,http://localhost:*,http://127.0.0.1:*"
